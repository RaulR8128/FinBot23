<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Forzar recarga de caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Raúl | Multimodal Total</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTE DE ICONOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
                trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                send: <><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
                settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
                search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>,
                loader: <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
                mic: <><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></>,
                stop: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><rect width="8" height="8" x="8" y="8" rx="1"/></>,
                type: <><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></>,
                image: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
                sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${name === 'loader' ? 'animate-spin' : ''}`}>
                    {icons[name]}
                </svg>
            );
        };

        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzjNR4yFwUO6FPmT29mh_3fDUm9fkazo_8OeeMs4VR66I78nJxb84PiK8hJTTGDZzyM/exec";

        const App = () => {
            // Estados principales
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [step, setStep] = useState('upload'); 
            const [extractedData, setExtractedData] = useState(null);
            const [error, setError] = useState(null);
            const [registrationStatus, setRegistrationStatus] = useState(null);
            
            // Estados Multimodales
            const [inputMode, setInputMode] = useState('photo'); // photo, audio, text
            const [isRecording, setIsRecording] = useState(false);
            const [textInput, setTextInput] = useState('');
            const mediaRecorderRef = useRef(null);

            // Estados de Corrección Mágica
            const [correctionText, setCorrectionText] = useState('');
            const [isCorrecting, setIsCorrecting] = useState(false);
            const [isRecordingCorrection, setIsRecordingCorrection] = useState(false);
            const correctionMediaRecorderRef = useRef(null);
            
            // Configuración
            const [localApiKey, setLocalApiKey] = useState(localStorage.getItem('raul_gemini_key') || "");
            const [modelId, setModelId] = useState(localStorage.getItem('raul_model_id') || "gemini-2.5-flash");
            const [showSettings, setShowSettings] = useState(false);
            const [availableModels, setAvailableModels] = useState([]);
            const [fetchingModels, setFetchingModels] = useState(false);

            // FUNCIÓN: BUSCAR MODELOS
            const fetchModels = async () => {
                setFetchingModels(true);
                try {
                    if (!localApiKey) throw new Error("Por favor, ingresa tu API Key.");
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${localApiKey}`);
                    const data = await res.json();
                    if (data.models) {
                        const validModels = data.models
                            .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"))
                            .map(m => m.name.replace('models/', ''));
                        setAvailableModels(validModels);
                        if (validModels.length > 0 && !validModels.includes(modelId)) {
                            setModelId(validModels[0]);
                            localStorage.setItem('raul_model_id', validModels[0]);
                        }
                    } else {
                        throw new Error(data.error?.message || "Clave inválida o bloqueada.");
                    }
                } catch (e) {
                    alert("Error: " + e.message);
                } finally {
                    setFetchingModels(false);
                }
            };

            // GRABACIÓN DE AUDIO (Inicial)
            const handleStartRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => processInput(reader.result, 'audio');
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    setIsRecording(true);
                } catch (err) {
                    alert("Error al acceder al micrófono. Asegúrate de dar los permisos.");
                }
            };
            const handleStopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                }
            };

            // GRABACIÓN DE AUDIO (Corrección)
            const handleStartCorrectionRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    correctionMediaRecorderRef.current = mediaRecorder;
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => applyCorrection(reader.result, 'audio');
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    setIsRecordingCorrection(true);
                } catch (err) {
                    alert("Error al acceder al micrófono.");
                }
            };
            const handleStopCorrectionRecording = () => {
                if (correctionMediaRecorderRef.current && isRecordingCorrection) {
                    correctionMediaRecorderRef.current.stop();
                    setIsRecordingCorrection(false);
                }
            };

            // LLAMADA GEMINI (Inicial)
            const callGeminiInitial = async (inputData, type, retries = 0) => {
                if (!localApiKey) throw new Error("Falta la API Key de Google.");
                const todayStr = new Date().toLocaleDateString('es-CL');
                const promptText = `ACTÚA COMO UN ANALISTA FINANCIERO PERSONAL.
Analiza la información proporcionada (boleta, audio o texto) y extrae los datos:
1. Extrae: Fecha (DD/MM/AAAA), Comercio, Monto Total, Moneda (Siempre CLP). 
   IMPORTANTE: Si no hay fecha visible o no se menciona, asume que fue hoy: ${todayStr}.
2. Atomicidad: CADA producto debe ser una fila independiente. Prohibido agrupar.
3. Formato: Responde EXCLUSIVAMENTE con un JSON válido con esta estructura exacta:
{
  "fecha": "DD/MM/AAAA",
  "comercio": "Nombre del Comercio",
  "cuentaPrincipal": "Tarjeta/Efectivo/Pluxee",
  "items": [{"descripcion": "Producto", "monto": 1000, "categoria": "Alimentación", "cuenta": "Sugerida"}]
}
Solo devuelve el JSON puro, sin explicaciones ni markdown.`;

                let parts = [{ text: promptText }];
                if (type === 'text') {
                    parts.push({ text: `Información de gasto dictada: "${inputData}"` });
                } else if (type === 'image' || type === 'audio') {
                    const [header, base64Str] = inputData.split(',');
                    const mimeType = header.match(/:(.*?);/)[1];
                    parts.push({ inlineData: { mimeType, data: base64Str } });
                }

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${localApiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: parts }] })
                    });
                    if (!response.ok) throw new Error("Error en el servidor de Google");
                    
                    const data = await response.json();
                    if (!data.candidates || data.candidates.length === 0) throw new Error("La IA no generó una respuesta.");

                    const jsonMatch = data.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("Formato de datos inválido devuelto por la IA.");
                    
                    return JSON.parse(jsonMatch[0]);
                } catch (err) {
                    if (retries < 1) {
                        await new Promise(res => setTimeout(res, 2000));
                        return callGeminiInitial(inputData, type, retries + 1);
                    }
                    throw err;
                }
            };

            // LLAMADA GEMINI (Corrección Mágica)
            const callGeminiCorrection = async (inputData, type, retries = 0) => {
                if (!localApiKey) throw new Error("Falta la API Key.");
                const promptText = `ACTÚA COMO UN ANALISTA FINANCIERO PERSONAL.
Aquí tienes el JSON actual de un registro de gastos:
${JSON.stringify(extractedData, null, 2)}

El usuario solicita la siguiente corrección o modificación:
${type === 'text' ? `"${inputData}"` : "Escucha el audio adjunto con las instrucciones de corrección."}

Aplica los cambios solicitados al JSON anterior. Mantén la estructura estricta:
{"fecha": "DD/MM/AAAA", "comercio": "Nombre", "cuentaPrincipal": "...", "items": [{"descripcion": "...", "monto": 0, "categoria": "...", "cuenta": "..."}]}
Devuelve EXCLUSIVAMENTE el JSON modificado en su totalidad, sin bloques markdown.`;

                let parts = [{ text: promptText }];
                if (type === 'audio') {
                    const [header, base64Str] = inputData.split(',');
                    const mimeType = header.match(/:(.*?);/)[1];
                    parts.push({ inlineData: { mimeType, data: base64Str } });
                }

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${localApiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: parts }] })
                    });
                    if (!response.ok) throw new Error("Error procesando la corrección.");
                    
                    const data = await response.json();
                    if (!data.candidates || data.candidates.length === 0) throw new Error("La IA no generó una corrección.");

                    const jsonMatch = data.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("El modelo no devolvió un JSON válido en la corrección.");
                    
                    return JSON.parse(jsonMatch[0]);
                } catch (err) {
                    if (retries < 1) {
                        await new Promise(res => setTimeout(res, 2000));
                        return callGeminiCorrection(inputData, type, retries + 1);
                    }
                    throw err;
                }
            };

            // MANEJADORES DE PROCESAMIENTO
            const processInput = async (inputData, type) => {
                setLoading(true); 
                setError(null);
                if (type === 'image') setImage(inputData); 
                else setImage(null);

                try {
                    const parsedData = await callGeminiInitial(inputData, type);
                    // Asegurarnos de que "items" siempre exista para evitar cuelgues
                    if (!parsedData.items) parsedData.items = [];
                    setExtractedData(parsedData);
                    setStep('confirm');
                } catch (err) { 
                    setError("Fallo en el análisis: " + err.message); 
                } finally { 
                    setLoading(false); 
                }
            };

            const applyCorrection = async (inputData, type) => {
                setIsCorrecting(true); 
                setError(null);
                try {
                    const updatedData = await callGeminiCorrection(inputData, type);
                    if (!updatedData.items) updatedData.items = [];
                    setExtractedData(updatedData);
                    setCorrectionText('');
                } catch (err) {
                    alert("Error en la corrección: " + err.message);
                } finally {
                    setIsCorrecting(false);
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => processInput(e.target.result, 'image');
                    reader.readAsDataURL(file);
                }
            };

            const handleTextSubmit = () => {
                if (!textInput.trim()) return;
                processInput(textInput, 'text');
            };

            const handleRegister = async () => {
                setIsSubmitting(true);
                try {
                    if (!extractedData || !extractedData.items || extractedData.items.length === 0) {
                        throw new Error("No hay datos válidos para registrar.");
                    }
                    const rows = extractedData.items.map(item => [
                        extractedData.fecha || "", 
                        "Gasto", 
                        item.categoria || "", 
                        item.cuenta || "", 
                        item.descripcion || "", 
                        item.monto || 0, 
                        "CLP", 
                        `Comercio: ${extractedData.comercio || ""}`
                    ].join(';'));
                    const finalUrl = `${WEBHOOK_URL}?data=${encodeURIComponent(rows.join('|'))}`;
                    await fetch(finalUrl, { method: 'GET', mode: 'no-cors' });
                    setRegistrationStatus('success');
                    setStep('result');
                } catch (err) {
                    setRegistrationStatus('error');
                    setStep('result');
                } finally { 
                    setIsSubmitting(false); 
                }
            };

            return (
                <div className="min-h-screen p-4 flex items-center justify-center bg-slate-100">
                    <div className="max-w-4xl w-full">
                        <header className="mb-6 flex justify-between items-center px-4">
                            <h1 className="text-2xl font-black text-indigo-900 tracking-tighter uppercase italic text-center md:text-left">
                                Raúl <span className="text-indigo-500 font-light underline">Finanzas 6.1</span>
                            </h1>
                            <button onClick={() => setShowSettings(!showSettings)} className="p-3 bg-white rounded-2xl shadow-sm text-slate-400 active:scale-95 transition-all relative">
                                {!localApiKey && <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full animate-ping"></span>}
                                <Icon name="settings" size={24} />
                            </button>
                        </header>

                        {showSettings && (
                            <div className="mb-6 bg-white p-6 rounded-[2rem] border shadow-2xl animate-in slide-in-from-top duration-300">
                                <h3 className="text-xs font-black text-indigo-900 uppercase mb-4 tracking-[0.2em] text-center">Configuración Segura</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Clave Privada API</label>
                                        <input 
                                            type="password" 
                                            value={localApiKey} 
                                            onChange={(e) => { setLocalApiKey(e.target.value); localStorage.setItem('raul_gemini_key', e.target.value); }} 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none mb-2" 
                                            placeholder="Pega tu API Key de Google aquí"
                                        />
                                        <p className="text-[9px] text-emerald-600 font-bold mb-3 italic">🔒 Guardado localmente.</p>
                                    </div>
                                    <div className="pt-2 border-t border-slate-100">
                                        <button onClick={fetchModels} disabled={fetchingModels || !localApiKey} className={`w-full ${!localApiKey ? 'bg-slate-100 text-slate-400' : 'bg-indigo-50 text-indigo-600'} border border-indigo-100 rounded-xl p-3 text-xs font-bold flex justify-center items-center gap-2 active:scale-95 transition-all`}>
                                            {fetchingModels ? <Icon name="loader" size={16}/> : <Icon name="search" size={16}/>}
                                            ESCANEAR MODELOS
                                        </button>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Modelo Seleccionado</label>
                                        <select value={modelId} onChange={(e) => {setModelId(e.target.value); localStorage.setItem('raul_model_id', e.target.value);}} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                                            {availableModels.length > 0 ? availableModels.map(m => <option key={m} value={m}>{m.toUpperCase()}</option>) : (
                                                <><option value="gemini-2.5-flash">Gemini 2.5 Flash</option><option value="gemini-1.5-flash">Gemini 1.5 Flash</option></>
                                            )}
                                        </select>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 shadow-lg mt-4">Guardar y Cerrar</button>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden min-h-[450px]">
                            {step === 'upload' && (
                                <div className="p-8 md:p-12 text-center">
                                    {!loading ? (
                                        <div className="flex flex-col items-center">
                                            <h2 className="text-2xl font-black mb-6 text-slate-800 tracking-tight">Ingresar Gasto</h2>
                                            
                                            {!localApiKey ? (
                                                <div className="mt-2 mb-8 bg-red-50 p-4 rounded-2xl border border-red-100 w-full max-w-sm">
                                                    <p className="text-[10px] font-black text-red-600 uppercase tracking-widest mb-2">⚠️ Configuración Pendiente</p>
                                                    <button onClick={() => setShowSettings(true)} className="bg-white text-red-600 border border-red-200 w-full py-2 rounded-xl text-xs font-bold active:scale-95 shadow-sm">Abrir Ajustes ⚙️</button>
                                                </div>
                                            ) : (
                                                <div className="w-full max-w-sm">
                                                    <div className="flex justify-center bg-slate-100 p-1.5 rounded-2xl mb-8 border border-slate-200 shadow-inner">
                                                        <button onClick={() => setInputMode('photo')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all flex justify-center items-center gap-2 uppercase tracking-widest ${inputMode === 'photo' ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-500'}`}><Icon name="camera" size={14}/> Foto</button>
                                                        <button onClick={() => setInputMode('audio')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all flex justify-center items-center gap-2 uppercase tracking-widest ${inputMode === 'audio' ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-500'}`}><Icon name="mic" size={14}/> Audio</button>
                                                        <button onClick={() => setInputMode('text')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all flex justify-center items-center gap-2 uppercase tracking-widest ${inputMode === 'text' ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-500'}`}><Icon name="type" size={14}/> Texto</button>
                                                    </div>

                                                    {inputMode === 'photo' && (
                                                        <div className="flex flex-col gap-4 animate-in fade-in duration-300">
                                                            <label className="cursor-pointer bg-slate-900 text-white w-full py-5 rounded-[1.5rem] font-black flex justify-center items-center gap-3 active:scale-95 shadow-xl hover:bg-black transition-all tracking-widest text-[11px]">
                                                                <Icon name="camera" size={18}/> ABRIR CÁMARA
                                                                <input type="file" className="hidden" accept="image/*" capture="environment" onChange={handleFileChange} />
                                                            </label>
                                                            <label className="cursor-pointer bg-white border border-slate-200 text-slate-700 w-full py-4 rounded-[1.5rem] font-black flex justify-center items-center gap-3 active:scale-95 shadow-sm hover:bg-slate-50 transition-all tracking-widest text-[10px]">
                                                                <Icon name="image" size={16}/> DESDE GALERÍA
                                                                <input type="file" className="hidden" accept="image/*" onChange={handleFileChange} />
                                                            </label>
                                                        </div>
                                                    )}

                                                    {inputMode === 'audio' && (
                                                        <div className="flex flex-col items-center py-6 animate-in fade-in duration-300">
                                                            {!isRecording ? (
                                                                <button onClick={handleStartRecording} className="bg-red-500 text-white w-28 h-28 rounded-full flex justify-center items-center shadow-xl shadow-red-200 active:scale-90 transition-all hover:bg-red-600 animate-pulse-slow"><Icon name="mic" size={48} /></button>
                                                            ) : (
                                                                <button onClick={handleStopRecording} className="bg-slate-900 text-white w-28 h-28 rounded-full flex justify-center items-center shadow-xl shadow-slate-300 active:scale-90 transition-all animate-pulse"><Icon name="stop" size={48} /></button>
                                                            )}
                                                            <p className="text-[10px] font-black text-slate-400 mt-8 uppercase tracking-[0.2em] text-center">
                                                                {isRecording ? "Grabando... Toca el cuadro negro para detener y analizar" : "Toca el círculo rojo para dictar el gasto"}
                                                            </p>
                                                        </div>
                                                    )}

                                                    {inputMode === 'text' && (
                                                        <div className="flex flex-col gap-4 animate-in fade-in duration-300">
                                                            <textarea value={textInput} onChange={(e) => setTextInput(e.target.value)} placeholder="Ej: Gasté 15.000 en el Jumbo, fueron 10.000 en asado y 5.000 en pan..." className="w-full bg-slate-50 border border-slate-200 rounded-3xl p-5 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none resize-none h-36" />
                                                            <button onClick={handleTextSubmit} disabled={!textInput.trim()} className="w-full bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black disabled:bg-slate-200 disabled:text-slate-400 active:scale-95 shadow-xl transition-all text-[11px] uppercase tracking-widest flex justify-center items-center gap-2"><Icon name="type" size={16}/> PROCESAR TEXTO</button>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                            {error && <div className="mt-8 text-red-600 text-[10px] font-black bg-red-50 p-6 rounded-[2rem] border border-red-100 uppercase text-left max-w-sm shadow-sm">{error}</div>}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center py-24"><Icon name="loader" size={68} className="text-indigo-600 mb-8 animate-spin" /><h2 className="text-xl font-bold tracking-tight text-slate-800 uppercase italic">Procesando...</h2></div>
                                    )}
                                </div>
                            )}

                            {step === 'confirm' && extractedData && (
                                <div className="flex flex-col md:flex-row h-auto md:min-h-[600px]">
                                    <div className="w-full md:w-2/5 bg-slate-100 border-r relative min-h-[250px] flex items-center justify-center overflow-hidden">
                                        {image ? <img src={image} className="w-full h-full object-contain p-4 shadow-inner" /> : (
                                            <div className="flex flex-col items-center opacity-20"><Icon name={inputMode === 'audio' ? 'mic' : 'type'} size={80} /><p className="mt-6 font-black uppercase tracking-[0.3em] text-xs">Modo {inputMode}</p></div>
                                        )}
                                        <button onClick={() => {setStep('upload'); setTextInput('');}} className="absolute bottom-4 left-4 bg-white/95 px-6 py-3 text-[10px] font-black text-red-500 rounded-[1.2rem] shadow-2xl border border-red-50 uppercase tracking-widest active:scale-90 transition-all">DESCARTAR</button>
                                    </div>
                                    <div className="w-full md:w-3/5 flex flex-col bg-slate-50/40">
                                        <div className="p-6 bg-indigo-900 text-white grid grid-cols-2 gap-4 shadow-2xl z-10">
                                            <div>
                                                <label className="text-[9px] font-black text-indigo-300 uppercase block px-1 mb-1 tracking-widest">Comercio</label>
                                                <input value={extractedData.comercio || ""} onChange={e => setExtractedData({...extractedData, comercio: e.target.value})} className="bg-indigo-800 w-full rounded-xl p-3 text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-400" />
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-black text-indigo-300 uppercase block px-1 mb-1 tracking-widest">Fecha</label>
                                                <input value={extractedData.fecha || ""} onChange={e => setExtractedData({...extractedData, fecha: e.target.value})} className="bg-indigo-800 w-full rounded-xl p-3 text-xs font-mono border-none outline-none focus:ring-2 focus:ring-indigo-400" />
                                            </div>
                                        </div>
                                        
                                        <div className="flex-1 overflow-y-auto p-5 space-y-4 custom-scroll">
                                            {extractedData?.items?.map((item, idx) => (
                                                <div key={idx} className="bg-white p-5 rounded-[1.8rem] border border-slate-200 shadow-sm hover:border-indigo-400 transition-all hover:shadow-xl group">
                                                    <div className="flex justify-between items-start gap-4 mb-3">
                                                        <textarea rows="1" className="flex-1 font-bold text-[13px] bg-transparent border-none p-0 focus:ring-0 resize-none text-slate-800 outline-none" value={item.descripcion || ""} onChange={e => {
                                                            const newItems = [...extractedData.items];
                                                            newItems[idx].descripcion = e.target.value;
                                                            setExtractedData({...extractedData, items: newItems});
                                                        }} />
                                                        <div className="font-mono font-black text-indigo-700 text-lg">$<input type="number" className="w-20 bg-transparent text-right border-none p-0 focus:ring-0 outline-none" value={item.monto || 0} onChange={e => {
                                                            const newItems = [...extractedData.items];
                                                            newItems[idx].monto = parseInt(e.target.value) || 0;
                                                            setExtractedData({...extractedData, items: newItems});
                                                        }} /></div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <input className="text-[9px] bg-slate-100 px-3 py-1.5 rounded-xl font-black text-slate-500 border-none uppercase tracking-tighter outline-none" value={item.categoria || ""} onChange={e => {
                                                            const newItems = [...extractedData.items];
                                                            newItems[idx].categoria = e.target.value;
                                                            setExtractedData({...extractedData, items: newItems});
                                                        }} />
                                                        <input className="text-[9px] bg-indigo-50 px-3 py-1.5 rounded-xl font-black text-indigo-600 border-none uppercase tracking-tighter outline-none" value={item.cuenta || ""} onChange={e => {
                                                            const newItems = [...extractedData.items];
                                                            newItems[idx].cuenta = e.target.value;
                                                            setExtractedData({...extractedData, items: newItems});
                                                        }} />
                                                        <button onClick={() => setExtractedData({...extractedData, items: extractedData.items.filter((_, i) => i !== idx)})} className="ml-auto text-slate-200 hover:text-red-500 transition-colors"><Icon name="trash" size={20}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            <button onClick={() => setExtractedData({...extractedData, items: [...(extractedData.items || []), {descripcion: "Manual", monto: 0, categoria: "Varios", cuenta: extractedData?.items?.[0]?.cuenta || "Sin Cuenta"}]})} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-300 text-[10px] font-black uppercase tracking-[0.2em] hover:border-indigo-300 hover:text-indigo-400 transition-all">+ AÑADIR LÍNEA</button>
                                            
                                            {/* CAJA DE CORRECCIÓN MÁGICA IA */}
                                            <div className="mt-8 p-5 bg-indigo-50 border border-indigo-100 rounded-3xl">
                                                <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                                                    <Icon name="sparkles" size={14}/> Corrección con IA (Voz o Texto)
                                                </p>
                                                <div className="flex flex-col md:flex-row gap-3">
                                                    <textarea value={correctionText} onChange={e => setCorrectionText(e.target.value)} placeholder="Ej: Cambia el pan a categoría Hogar..." className="flex-1 bg-white border border-indigo-100 rounded-2xl p-3 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 resize-none h-12" />
                                                    <div className="flex gap-2">
                                                        {!isRecordingCorrection ? (
                                                            <button onClick={handleStartCorrectionRecording} className="bg-white border border-red-200 hover:bg-red-50 text-red-500 p-3 rounded-2xl transition-all shadow-sm flex-shrink-0 active:scale-95"><Icon name="mic" size={20} /></button>
                                                        ) : (
                                                            <button onClick={handleStopCorrectionRecording} className="bg-red-500 text-white p-3 rounded-2xl transition-all shadow-md animate-pulse flex-shrink-0 active:scale-95"><Icon name="stop" size={20} /></button>
                                                        )}
                                                        <button onClick={() => applyCorrection(correctionText, 'text')} disabled={!correctionText.trim() || isCorrecting} className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:text-slate-500 text-white px-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all shadow-md active:scale-95 flex items-center gap-2">
                                                            {isCorrecting ? <Icon name="loader" size={16} /> : "Aplicar"}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="p-8 bg-white border-t flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.08)] relative z-20">
                                            <div className="text-3xl font-black text-slate-900 tracking-tighter leading-none">${extractedData?.items?.reduce((acc, item) => acc + (item.monto || 0), 0).toLocaleString()}</div>
                                            <button onClick={handleRegister} disabled={isSubmitting || !extractedData?.items?.length} className="bg-slate-900 text-white px-10 py-5 rounded-[1.5rem] font-black flex items-center gap-3 shadow-2xl disabled:bg-slate-200 disabled:shadow-none active:scale-95 hover:bg-black transition-all uppercase tracking-widest text-[11px]">
                                                {isSubmitting ? <Icon name="loader" /> : <><Icon name="send" /> ENVIAR A SHEETS</>}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {step === 'result' && (
                                <div className="p-16 text-center animate-in zoom-in duration-500">
                                    <div className={`w-32 h-32 mx-auto rounded-[2.8rem] flex items-center justify-center mb-10 shadow-inner ${registrationStatus === 'success' ? 'bg-green-100 text-green-600 shadow-green-100' : 'bg-amber-100 text-amber-600 shadow-amber-100'}`}>
                                        <Icon name={registrationStatus === 'success' ? 'check' : 'alert'} size={64} />
                                    </div>
                                    <h2 className="text-3xl font-black mb-14 tracking-tighter text-slate-800 uppercase italic">{registrationStatus === 'success' ? "¡Registro Guardado!" : "Error en el Script"}</h2>
                                    <button onClick={() => {setStep('upload'); setTextInput('');}} className="bg-indigo-600 text-white px-16 py-6 rounded-[2.2rem] font-black tracking-widest shadow-2xl active:scale-95 transition-all uppercase text-[11px] hover:bg-indigo-700">SIGUIENTE GASTO</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
